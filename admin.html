<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin TonNeed</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: Arial, sans-serif; background:#040D1A; color:#E8F4FF; min-height:100vh; }
  .header { background:#071628; padding:16px 20px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid rgba(0,136,204,0.3); position:sticky; top:0; z-index:10; }
  .header h1 { color:#00AAFF; font-size:18px; }
  .stats { display:grid; grid-template-columns:1fr 1fr; gap:12px; padding:16px; }
  .stat { background:rgba(0,136,204,0.1); border:1px solid rgba(0,136,204,0.2); border-radius:12px; padding:16px; text-align:center; }
  .stat-num { font-size:28px; font-weight:bold; color:#00AAFF; }
  .stat-label { font-size:12px; color:rgba(232,244,255,0.6); margin-top:4px; }
  .section { padding:0 16px 16px; }
  .user-card { background:rgba(0,136,204,0.06); border:1px solid rgba(0,136,204,0.2); border-radius:12px; padding:14px; margin-bottom:10px; }
  .user-id { font-size:18px; font-weight:bold; color:#00AAFF; margin-bottom:4px; }
  .user-name { font-size:14px; font-weight:bold; margin-bottom:4px; }
  .user-info { font-size:12px; color:rgba(232,244,255,0.6); margin-bottom:4px; }
  .user-wallet { font-size:10px; color:#00AAFF; background:rgba(0,0,0,0.3); border-radius:8px; padding:8px; word-break:break-all; margin:8px 0; }
  .stats-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin:8px 0; }
  .stat-box { background:rgba(0,0,0,0.2); border-radius:8px; padding:8px; text-align:center; }
  .stat-box-label { font-size:10px; color:rgba(232,244,255,0.6); }
  .stat-box-val { font-size:14px; font-weight:bold; margin-top:2px; }
  .btn-reset { width:100%; background:rgba(255,68,68,0.15); border:1px solid rgba(255,68,68,0.4); color:#FF4444; border-radius:8px; padding:10px; font-size:13px; font-weight:bold; cursor:pointer; margin-top:8px; }
  .loading { text-align:center; padding:40px; color:rgba(232,244,255,0.5); }
  .search-box { width:100%; background:rgba(0,136,204,0.08); border:1px solid rgba(0,136,204,0.2); border-radius:10px; padding:10px 14px; color:#E8F4FF; font-size:14px; margin-bottom:12px; }
  .btn-refresh { background:#00AAFF; border:none; color:#000; border-radius:8px; padding:8px 16px; font-weight:bold; cursor:pointer; }
  .withdrawal-card { background:rgba(0,136,204,0.06); border:1px solid rgba(0,136,204,0.2); border-radius:12px; padding:14px; margin-bottom:10px; }
  .btn-approve { background:rgba(0,230,118,0.15); border:1px solid rgba(0,230,118,0.4); color:#00E676; border-radius:8px; padding:8px 16px; font-size:12px; cursor:pointer; }
  .btn-reject { background:rgba(255,68,68,0.15); border:1px solid rgba(255,68,68,0.4); color:#FF4444; border-radius:8px; padding:8px 16px; font-size:12px; cursor:pointer; }
  .tabs { display:flex; gap:8px; padding:0 16px 12px; }
  .tab { flex:1; padding:10px; text-align:center; border-radius:10px; border:1px solid rgba(0,136,204,0.2); background:rgba(0,136,204,0.06); color:rgba(232,244,255,0.6); cursor:pointer; font-size:13px; }
  .tab.active { background:rgba(0,136,204,0.2); color:#00AAFF; border-color:#00AAFF; }
  .tab-content { display:none; }
  .tab-content.active { display:block; }
  .toast { position:fixed; bottom:40px; left:50%; transform:translateX(-50%); background:#00E676; color:#000; padding:10px 24px; border-radius:20px; font-weight:bold; display:none; z-index:999; }
  .badge { display:inline-block; background:rgba(0,136,204,0.2); border:1px solid rgba(0,136,204,0.3); border-radius:20px; padding:3px 10px; font-size:11px; color:#00AAFF; }
</style>
</head>
<body>

<div class="header">
  <h1>🔐 Admin TonNeed</h1>
  <button class="btn-refresh" onclick="loadAll()">🔄 تحديث</button>
</div>

<div class="stats">
  <div class="stat">
    <div class="stat-num" id="total-users">-</div>
    <div class="stat-label">👥 المشتركون</div>
  </div>
  <div class="stat">
    <div class="stat-num" id="total-pending">-</div>
    <div class="stat-label">🚀 السحوبات المعلقة</div>
  </div>
</div>

<div class="tabs">
  <div class="tab active" id="tab-btn-users" onclick="switchTab('users', this)">👥 المشتركون</div>
  <div class="tab" id="tab-btn-withdrawals" onclick="switchTab('withdrawals', this)">🚀 السحوبات</div>
</div>

<div id="tab-users" class="tab-content active">
  <div class="section">
    <input class="search-box" id="search" placeholder="🔍 ابحث بالـ ID أو الاسم..." oninput="filterUsers()">
    <div id="users-list"><div class="loading">⏳ جاري التحميل...</div></div>
  </div>
</div>

<div id="tab-withdrawals" class="tab-content">
  <div class="section">
    <div id="withdrawals-list"><div class="loading">⏳ جاري التحميل...</div></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAsNRuN09FLendzP60yBaiw7hV3Toex0D0",
  authDomain: "tonminer-87923.firebaseapp.com",
  databaseURL: "https://tonminer-87923-default-rtdb.firebaseio.com",
  projectId: "tonminer-87923",
  storageBucket: "tonminer-87923.firebasestorage.app",
  messagingSenderId: "448286820819",
  appId: "1:448286820819:web:abc123"
};

firebase.initializeApp(firebaseConfig);
const fdb = firebase.database();

let allUsers = [];
let allWithdrawals = [];

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 3000);
}

function switchTab(name, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  el.classList.add('active');
}

function toArray(val) {
  if (!val) return [];
  if (Array.isArray(val)) return val.filter(v => v != null);
  return Object.values(val).filter(v => v != null);
}

function loadAll() {
  document.getElementById('users-list').innerHTML = '<div class="loading">⏳ جاري التحميل...</div>';
  document.getElementById('withdrawals-list').innerHTML = '<div class="loading">⏳ جاري التحميل...</div>';

  fdb.ref('tonneed').once('value').then(snapshot => {
    const data = snapshot.val();
    if (!data) {
      document.getElementById('users-list').innerHTML = '<div class="loading">❌ لا توجد بيانات في Firebase</div>';
      return;
    }

    allUsers = toArray(data.users);
    allWithdrawals = toArray(data.withdrawals);

    document.getElementById('total-users').textContent = allUsers.length;
    document.getElementById('total-pending').textContent = allWithdrawals.filter(w => w.status === 'pending').length;

    renderUsers(allUsers);
    renderWithdrawals(allWithdrawals);
  }).catch(err => {
    document.getElementById('users-list').innerHTML = '<div class="loading">❌ خطأ في الاتصال: ' + err.message + '</div>';
  });
}

function filterUsers() {
  const q = document.getElementById('search').value.trim().toLowerCase();
  const filtered = q ? allUsers.filter(u =>
    String(u.id).includes(q) ||
    (u.name && u.name.toLowerCase().includes(q)) ||
    (u.email && u.email.toLowerCase().includes(q))
  ) : allUsers;
  renderUsers(filtered);
}

function getRefs(u) {
  if (!u.referrals) return 0;
  if (Array.isArray(u.referrals)) return u.referrals.filter(r => r != null).length;
  return Object.keys(u.referrals).length;
}

function renderUsers(users) {
  const list = document.getElementById('users-list');
  if (!users.length) {
    list.innerHTML = '<div class="loading">❌ لا يوجد مستخدمين</div>';
    return;
  }
  list.innerHTML = users.map((u, idx) => `
    <div class="user-card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <div class="user-id">ID: ${u.id}</div>
        <span class="badge">Lv${u.level || 1}</span>
      </div>
      <div class="user-name">👤 ${u.name || '—'}</div>
      <div class="user-info">📧 ${u.email || '—'}</div>
      <div class="user-info">📱 Telegram: ${u.telegramId || '—'}</div>
      <div class="user-info">📅 ${u.createdAt ? new Date(u.createdAt).toLocaleDateString('ar') : '—'}</div>
      <div class="user-wallet">👛 ${u.wallet || '—'}</div>
      <div class="stats-grid">
        <div class="stat-box">
          <div class="stat-box-label">💰 الرصيد</div>
          <div class="stat-box-val" style="color:#00E676">${(u.balance || 0).toFixed(4)} TON</div>
        </div>
        <div class="stat-box">
          <div class="stat-box-label">🚀 المسحوب</div>
          <div class="stat-box-val" style="color:#00AAFF">${(u.totalWithdrawn || 0).toFixed(4)} TON</div>
        </div>
        <div class="stat-box">
          <div class="stat-box-label">👥 المحالون</div>
          <div class="stat-box-val" style="color:#FFB800">${getRefs(u)}</div>
        </div>
        <div class="stat-box">
          <div class="stat-box-label">🔗 المحيل</div>
          <div class="stat-box-val" style="color:#00AAFF;font-size:12px">${u.referredBy || u.uplineId || '—'}</div>
        </div>
      </div>
      <button class="btn-reset" onclick="resetBalance(${u.id}, '${(u.name||'').replace(/'/g,"\\'")}', ${u.balance||0})">
        🔴 تصفير الرصيد (${(u.balance || 0).toFixed(4)} TON)
      </button>
    </div>
  `).join('');
}

function renderWithdrawals(withdrawals) {
  const list = document.getElementById('withdrawals-list');
  if (!withdrawals.length) {
    list.innerHTML = '<div class="loading">✅ لا توجد سحوبات</div>';
    return;
  }
  list.innerHTML = [...withdrawals].reverse().map(w => `
    <div class="withdrawal-card">
      <div style="display:flex;justify-content:space-between;margin-bottom:8px">
        <div style="font-weight:bold">${w.userName || '—'}</div>
        <span class="badge" style="${w.status==='pending'?'color:#FFB800':'color:#00E676'}">${w.status==='pending'?'⏳ معلق':'✅ تم'}</span>
      </div>
      <div style="font-size:13px;color:#00AAFF;margin-bottom:4px">${(w.amount||0).toFixed(4)} TON</div>
      <div style="font-size:11px;color:rgba(232,244,255,0.5);word-break:break-all;margin-bottom:8px">${w.wallet||'—'}</div>
      ${w.status==='pending' ? `
      <div style="display:flex;gap:8px">
        <button class="btn-approve" onclick="approveWithdrawal(${w.id})">✅ تأكيد الدفع</button>
        <button class="btn-reject" onclick="rejectWithdrawal(${w.id})">❌ رفض</button>
      </div>` : ''}
    </div>
  `).join('');
}

function findKey(ref, matchFn) {
  return fdb.ref(ref).once('value').then(snap => {
    const val = snap.val();
    if (!val) return null;
    if (Array.isArray(val)) {
      const idx = val.findIndex(matchFn);
      return idx !== -1 ? idx : null;
    }
    for (const k of Object.keys(val)) {
      if (matchFn(val[k])) return k;
    }
    return null;
  });
}

function resetBalance(userId, userName, currentBalance) {
  if (!confirm('⚠️ تصفير رصيد ' + userName + '?\nالرصيد الحالي: ' + currentBalance.toFixed(4) + ' TON')) return;
  findKey('tonneed/users', u => u && u.id === userId).then(key => {
    if (key === null) { showToast('❌ لم يتم العثور على المستخدم'); return; }
    fdb.ref('tonneed/users/' + key + '/balance').set(0).then(() => {
      showToast('✅ تم تصفير الرصيد بنجاح');
      loadAll();
    });
  });
}

function approveWithdrawal(wId) {
  findKey('tonneed/withdrawals', w => w && w.id === wId).then(wKey => {
    if (wKey === null) return;
    fdb.ref('tonneed/withdrawals/' + wKey).once('value').then(snap => {
      const w = snap.val();
      fdb.ref('tonneed/withdrawals/' + wKey + '/status').set('done');
      findKey('tonneed/users', u => u && u.id === w.userId).then(uKey => {
        if (uKey === null) return;
        fdb.ref('tonneed/users/' + uKey).once('value').then(us => {
          const user = us.val();
          fdb.ref('tonneed/users/' + uKey + '/balance').set(Math.max(0, parseFloat(((user.balance||0) - (w.amount||0)).toFixed(4))));
          fdb.ref('tonneed/users/' + uKey + '/totalWithdrawn').set(parseFloat(((user.totalWithdrawn||0) + (w.amount||0)).toFixed(4)));
        });
      });
      showToast('✅ تم تأكيد الدفع');
      setTimeout(loadAll, 1000);
    });
  });
}

function rejectWithdrawal(wId) {
  if (!confirm('رفض الطلب وإعادة الرصيد؟')) return;
  findKey('tonneed/withdrawals', w => w && w.id === wId).then(wKey => {
    if (wKey === null) return;
    fdb.ref('tonneed/withdrawals/' + wKey).once('value').then(snap => {
      const w = snap.val();
      findKey('tonneed/users', u => u && u.id === w.userId).then(uKey => {
        if (uKey !== null) {
          fdb.ref('tonneed/users/' + uKey).once('value').then(us => {
            fdb.ref('tonneed/users/' + uKey + '/balance').set(parseFloat(((us.val().balance||0) + (w.amount||0)).toFixed(4)));
          });
        }
      });
      fdb.ref('tonneed/withdrawals/' + wKey).remove();
      showToast('❌ تم رفض الطلب وإعادة الرصيد');
      setTimeout(loadAll, 1000);
    });
  });
}

loadAll();
</script>
</body>
</html>
